upstream backend {
    server unix:/var/www/gunicorn.sock fail_timeout=0;
}

upstream mod_applications {
    server 127.0.0.1:8888 fail_timeout=0;
    keepalive 16;
}

map $host $event_root {
    default /var/www/html/__unknown_event__;
    fall-hacks.sfucsss.org /var/www/html/fall-hacks;
    frosh.sfucsss.org /var/www/html/frosh;
    madness.sfucsss.org /var/www/html/madness;
    tech-fair.sfucsss.org /var/www/html/tech-fair;
}

server {
    http2 on;
    listen 80;

    server_name
        fall-hacks.sfucsss.org
        frosh.sfucsss.org
        madness.sfucsss.org
        tech-fair.sfucsss.org;

    root $event_root;

    # Legacy shared assets
    location /static/ {
        alias /var/www/html/static/;
        try_files $uri $uri/ =404;
    }

    location ~ "^/(?<year>\d{4})(/.*)?$" {
        # Don't index previous sites
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri $uri/ $uri.html $year/index.html =404;
    }

    location / {
        root $event_root/latest;
        try_files $uri $uri/ /index.html =404;
        add_header Cache-Control "no-cache";

        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }
}

server {
    server_name new.sfucsss.org;
    http2 on;
    listen 80;

    client_max_body_size 20M; # Was 1G
    access_log /var/www/logs/mod-applications/nginx-access.log;
    error_log /var/www/logs/mod-applications/nginx-error.log;

    # proxy csss-site-backend
    location / {
        proxy http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://mod_applications;
    }
}

server {
    server_name sfucsss.org;
    http2 on;
    listen 80;

    root /var/www/html/main;

    access_log /var/www/logs/csss-site-backend/nginx-access.log;
    error_log /var/www/logs/csss-site-backend/nginx-error.log;

    # proxy csss-site-backend
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;

        keepalive_timeout 5;
        client_max_body_size 20M; # Was 1G

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://backend;
    }

    # Events had a URL scheme like `sfucsss.org/<event>/<year>[/<page>]`
    # We want to redirect them to `<event>.sfucsss.org[/<year>][/<page>]`
    location ~ "^/events/(mm|mountain_madness)/(?<year>\d{4})(?<page>/.*)$" {
        return 301 https://madness.sfucsss.org/$year$page;
    }

    # Since they used underscores before, we'll need to redirect URLs to the hyphenated version
    location ~ "^/events/(?<event>tech_fair|fall_hacks)(?<year>/\d{4})?(?<page>/.*)?$" {
        set $new_event "";
        if ($event = "tech_fair") {
            set $new_event "tech-fair";
        }
        if ($event = "fall_hacks") {
            set $new_event "fall-hacks";
        }
        return 301 https://$new_event.sfucsss.org$year$page;
    }

    # for the rest of the subdomains
    location ~ "^/events/(?<event>frosh|tech-fair|fall-hacks)(?<year>/\d{4})(?<page>/.*)?$" {
        return 301 https://$event.sfucsss.org$year$page;
    }

    location ~ ^/forms/ {
        alias /var/www/html/forms/;
        autoindex off;
        try_files $uri $uri.html;
    }

    location ~* "\.(woff2)$" {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    location ~* "\.html$" {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location / {
        charset utf-8;
        index index.html index.csr.html;
        # Main site is a SPA, so we always serve the main Angular application
        try_files $uri $uri/ /index.csr.html;
        add_header Cache-Control "no-cache";
    }
}

